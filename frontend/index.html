<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat History - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-box" id="loginBox">
            <h2>> Login_</h2>
            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button type="submit" style="width: 100%;">Execute</button>
            </form>
            <div class="auth-toggle" onclick="toggleAuth()">[ Initialize New User ]</div>
            <div id="loginError" style="color: var(--danger); margin-top: 10px; text-align: center;"></div>
        </div>

        <div class="auth-box" id="registerBox" style="display: none;">
            <h2>> Register_</h2>
            <form id="registerForm">
                <input type="text" id="regName" placeholder="Alias (Name)" required>
                <input type="email" id="regEmail" placeholder="Email" required>
                <input type="password" id="regPassword" placeholder="Password" required>
                <button type="submit" style="width: 100%;">Initialize</button>
            </form>
            <div class="auth-toggle" onclick="toggleAuth()">[ Return to Login ]</div>
            <div id="regError" style="color: var(--danger); margin-top: 10px; text-align: center;"></div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
